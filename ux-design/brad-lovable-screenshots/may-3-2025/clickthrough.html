<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brad's prototype — clickthrough</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #16181d;
    --panel-2: #1d2026;
    --border: #2a2e36;
    --text: #e6e7ea;
    --muted: #9aa0aa;
    --accent: #6aa6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  body { display: flex; flex-direction: column; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--panel);
    flex-shrink: 0;
  }
  header .title { font-weight: 600; font-size: 14px; }
  header .meta { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  header .filename {
    color: var(--muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
  }
  header button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 6px 10px; font-size: 13px; border-radius: 6px; cursor: pointer;
  }
  header button:hover { border-color: var(--accent); color: var(--accent); }
  header button:disabled { opacity: 0.4; cursor: not-allowed; }
  header .hint { color: var(--muted); font-size: 11px; }

  .stage {
    flex: 1; min-height: 0; overflow: auto; padding: 16px; background:
      repeating-conic-gradient(#15171c 0% 25%, #1a1c22 0% 50%) 0 0/24px 24px;
  }
  .stage img {
    display: block; margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    background: white;
  }

  .strip {
    flex-shrink: 0; display: flex; gap: 6px; overflow-x: auto;
    padding: 8px; border-top: 1px solid var(--border); background: var(--panel);
    scrollbar-width: thin;
  }
  .thumb {
    flex: 0 0 auto; width: 110px; height: 70px; border: 2px solid transparent;
    border-radius: 4px; overflow: hidden; cursor: pointer; background: #000;
    position: relative; padding: 0;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.7; }
  .thumb:hover img { opacity: 1; }
  .thumb.active { border-color: var(--accent); }
  .thumb.active img { opacity: 1; }
  .thumb .num {
    position: absolute; bottom: 2px; left: 4px;
    color: white; font-size: 10px; font-weight: 600;
    text-shadow: 0 0 3px black, 0 0 3px black;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<header>
  <div class="title">Brad's prototype</div>
  <button id="prev">‹ Prev</button>
  <button id="next">Next ›</button>
  <div class="meta"><span id="idx">1</span> / <span id="total">0</span></div>
  <div class="filename" id="filename"></div>
  <div class="hint">← → arrows · Home/End · click thumbnails</div>
</header>

<div class="stage" id="stage">
  <img id="main" alt="">
</div>

<div class="strip" id="strip"></div>

<script>
const FILES = [
  "Screenshot 2026-05-03 at 10.18.52 PM.png",
  "Screenshot 2026-05-03 at 10.19.22 PM.png",
  "Screenshot 2026-05-03 at 10.19.34 PM.png",
  "Screenshot 2026-05-03 at 10.20.09 PM.png",
  "Screenshot 2026-05-03 at 10.22.06 PM.png",
  "Screenshot 2026-05-03 at 10.23.10 PM.png",
  "Screenshot 2026-05-03 at 10.23.32 PM.png",
  "Screenshot 2026-05-03 at 10.23.50 PM.png",
  "Screenshot 2026-05-03 at 10.24.02 PM.png",
  "Screenshot 2026-05-03 at 10.24.13 PM.png",
  "Screenshot 2026-05-03 at 10.24.42 PM.png",
  "Screenshot 2026-05-03 at 10.24.47 PM.png",
  "FireShot Capture 034 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "Screenshot 2026-05-03 at 10.26.17 PM.png",
  "Screenshot 2026-05-03 at 10.29.08 PM.png",
  "FireShot Capture 035 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 036 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 037 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 038 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 039 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 040 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 041 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 042 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 043 - Accordli_ Analyze — AI - [accordli-confidential.com].png",
  "FireShot Capture 044 - Accordli_ Analyze — AI - [accordli-confidential.com].png"
];

const main = document.getElementById('main');
const idxEl = document.getElementById('idx');
const totalEl = document.getElementById('total');
const filenameEl = document.getElementById('filename');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const strip = document.getElementById('strip');
const stage = document.getElementById('stage');

totalEl.textContent = FILES.length;

let cur = 0;

function urlFor(name) { return 'img/' + encodeURIComponent(name); }

function show(i) {
  cur = Math.max(0, Math.min(FILES.length - 1, i));
  const name = FILES[cur];
  main.src = urlFor(name);
  main.alt = name;
  idxEl.textContent = cur + 1;
  filenameEl.textContent = name;
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === FILES.length - 1;
  document.querySelectorAll('.thumb').forEach((t, j) => {
    t.classList.toggle('active', j === cur);
  });
  const active = strip.children[cur];
  if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  stage.scrollTo({ top: 0, left: 0 });
  history.replaceState(null, '', '#' + (cur + 1));
}

FILES.forEach((name, i) => {
  const btn = document.createElement('button');
  btn.className = 'thumb';
  btn.title = name;
  btn.innerHTML = '<img loading="lazy" src="' + urlFor(name) + '" alt=""><span class="num">' + (i + 1) + '</span>';
  btn.addEventListener('click', () => show(i));
  strip.appendChild(btn);
});

prevBtn.addEventListener('click', () => show(cur - 1));
nextBtn.addEventListener('click', () => show(cur + 1));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(cur - 1); }
  else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); show(cur + 1); }
  else if (e.key === 'Home') { e.preventDefault(); show(0); }
  else if (e.key === 'End') { e.preventDefault(); show(FILES.length - 1); }
});

main.addEventListener('click', () => show(cur + 1));

const startHash = parseInt(location.hash.replace('#', ''), 10);
show(Number.isFinite(startHash) && startHash >= 1 ? startHash - 1 : 0);
</script>

</body>
</html>
